apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.redis.labels.app }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.redis.selectorLabels.app }}
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: {{ .Values.redis.service.port }}
      protocol: TCP