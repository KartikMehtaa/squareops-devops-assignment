apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-vote
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.vote.labels.app }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.vote.selectorLabels.app }}
  ports:
    - port: {{ .Values.vote.service.port }}
      targetPort: {{ .Values.vote.service.port }}
      protocol: TCP