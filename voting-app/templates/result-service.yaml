apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-result
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.result.labels.app }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.result.selectorLabels.app }}
  ports:
    - port: {{ .Values.result.service.port }}
      targetPort: {{ .Values.result.service.port }}
      protocol: TCP